  <div class="wrapper">

    <div class="footer-inner">
      <p>&copy; {{ 'now' | date: '%Y' }} {{ site.title | escape }}</p>

        <a href="https://github.com/{{ site.github_username_one }}">GitHub</a>
      </div>
    </div>

  </div>

</footer>
